# Si en el comando se activa el modo AOF (Append Only File)
# Cada operación de escritura se almacena en un fichero: appendonly.aof

services:
  redis:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command:  redis-server --appendonly yes # Activa el modo AOF
    
volumes:
  redis-data: