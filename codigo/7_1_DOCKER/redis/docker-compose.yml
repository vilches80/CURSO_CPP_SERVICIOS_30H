# en el command se activa el modo: AOF (Append Only File)
# cada operación de escritura se guarda en el archivo appendonly.aof 
# permita persistencia de datos incluso si el contenedor se reinicia, si no trabaja en memoria y los datos se pierden al parar el contenedor
# command indica el comando que se ejecutara al levantar el contenedor
services:
  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes # Funciona en modo 

volumes:
  redis-data:
